name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm test

      - name: Run migration smoke tests (sqlite + postgres)
        env:
          MIGRATION_SMOKE_POSTGRES: "true"
          MIGRATION_PG_HOST: 127.0.0.1
          MIGRATION_PG_PORT: "5432"
          MIGRATION_PG_USER: postgres
          MIGRATION_PG_PASSWORD: postgres
        run: npm run test:migrations
